<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Glücksrad Abstimmung</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

<div class="container">

  <h1>Glücksrad Abstimmung</h1>

  <div class="creator">
    <input type="text" id="questionInput" placeholder="Frage eingeben">

    <div id="optionsContainer">
      <input type="text" class="optionInput" placeholder="Antwortoption">
    </div>

    <button id="addOptionBtn">Weitere Option</button>
    <button id="createBtn">Frage erstellen</button>
  </div>

  <hr>

  <h2 id="currentQuestion"></h2>

  <div id="voteArea"></div>

  <canvas id="wheel" width="500" height="500"></canvas>

  <div class="buttons">
    <button id="spinBtn">SPIN</button>
    <button id="stopBtn">STOP</button>
  </div>

  <h2 id="winner"></h2>

</div>

<script type="module" src="supabase.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
