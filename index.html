<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glücksrad – Live Abstimmung</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0D1117;
      --surface: #161B22;
      --border:  #30363D;
      --text:    #F0EDE8;
      --muted:   #8B949E;
      --accent:  #58A6FF;
      --radius:  12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      overflow-x: hidden;
    }

    header {
      padding: 18px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #da3633;
      box-shadow: 0 0 6px #da3633;
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .status-dot.online { background: #2ea043; box-shadow: 0 0 6px #2ea043; }

    main {
      display: grid;
      grid-template-columns: 380px 1fr;
      height: calc(100vh - 57px);
    }

    .sidebar {
      border-right: 1px solid var(--border);
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .section-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .footer {
      border-top: 1px solid var(--border);
  padding: 14px 32px;
  font-size: 0.78rem;
  color: var(--muted);
  display: flex;
  justify-content: space-between;
  align-items: center;
      }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    input[type="text"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }

    .option-row { display: flex; align-items: center; gap: 8px; }
    .color-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
    .option-row input { flex: 1; }

    .remove-btn {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 1.1rem; padding: 2px 6px;
      border-radius: 4px; transition: color 0.1s, background 0.1s;
    }
    .remove-btn:hover { color: #FF6B6B; background: rgba(255,107,107,0.1); }

    .add-btn {
      background: none; border: 1px dashed var(--border);
      color: var(--muted); width: 100%; padding: 8px;
      border-radius: 8px; cursor: pointer; font-size: 0.85rem;
      transition: border-color 0.15s, color 0.15s;
    }
    .add-btn:hover { border-color: var(--accent); color: var(--accent); }

    .btn {
      background: var(--accent); color: #0D1117; border: none;
      border-radius: 8px; padding: 10px 16px;
      font-family: 'Space Grotesk', sans-serif; font-weight: 600;
      font-size: 0.88rem; cursor: pointer; width: 100%;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn.secondary {
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
    }
    .btn.danger {
      background: rgba(255,107,107,0.15); border: 1px solid rgba(255,107,107,0.3); color: #FF6B6B;
    }
    .btn-row { display: flex; gap: 8px; }
    .btn-row .btn { flex: 1; }

    .vote-option {
      display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
      padding: 10px 12px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 8px;
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
    }
    .vote-option:hover { border-color: var(--accent); background: rgba(88,166,255,0.05); }
    .vote-option.selected { border-color: var(--accent); background: rgba(88,166,255,0.1); }
    .vote-label { flex: 1; font-size: 0.9rem; }
    .vote-count { font-family: 'Space Grotesk', sans-serif; font-size: 0.8rem; font-weight: 600; color: var(--muted); }
    .vote-bar-wrap { width: 100%; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .vote-bar { height: 100%; border-radius: 2px; transition: width 0.4s ease; }

    .wheel-area {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 28px; padding: 32px; position: relative;
    }

    .wheel-question {
      font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem;
      font-weight: 600; text-align: center; max-width: 500px; min-height: 1.5em;
    }

    .wheel-container {
      position: relative;
      width: min(420px, 60vw);
      height: min(420px, 60vw);
    }

    .wheel-pointer {
      position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 14px solid transparent; border-right: 14px solid transparent;
      border-top: 32px solid #F0EDE8; z-index: 10;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5)); display: none;
    }

    #wheelCanvas {
      width: 100%; height: 100%; border-radius: 50%; display: none;
      box-shadow: 0 0 0 4px var(--border), 0 0 40px rgba(88,166,255,0.15), 0 8px 32px rgba(0,0,0,0.6);
    }

    .wheel-hub {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 40px; height: 40px; background: var(--bg);
      border: 3px solid var(--border); border-radius: 50%; z-index: 5; display: none;
    }

    .empty-wheel {
      display: flex; align-items: center; justify-content: center;
      width: 100%; height: 100%; border: 2px dashed var(--border);
      border-radius: 50%; color: var(--muted); font-size: 0.85rem;
      text-align: center; padding: 40px;
    }

    .wheel-controls { display: flex; gap: 14px; }

    .spin-btn {
      background: linear-gradient(135deg, #58A6FF, #4ECDC4); color: #0D1117;
      border: none; border-radius: 10px; padding: 14px 40px;
      font-family: 'Space Grotesk', sans-serif; font-weight: 700;
      font-size: 1rem; letter-spacing: 0.05em; cursor: pointer;
      box-shadow: 0 4px 20px rgba(88,166,255,0.3); transition: opacity 0.15s, transform 0.1s;
    }
    .spin-btn:hover { opacity: 0.9; }
    .spin-btn:active { transform: scale(0.97); }
    .spin-btn:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }

    .stop-btn {
      background: linear-gradient(135deg, #FF6B6B, #E17055); color: #fff;
      border: none; border-radius: 10px; padding: 14px 40px;
      font-family: 'Space Grotesk', sans-serif; font-weight: 700;
      font-size: 1rem; letter-spacing: 0.05em; cursor: pointer;
      box-shadow: 0 4px 20px rgba(255,107,107,0.3); transition: opacity 0.15s, transform 0.1s;
    }
    .stop-btn:hover { opacity: 0.9; }
    .stop-btn:active { transform: scale(0.97); }
    .stop-btn:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }

    .winner-banner {
      position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 28px;
      text-align: center; min-width: 240px;
      opacity: 0; transition: opacity 0.4s; pointer-events: none;
    }
    .winner-banner.show { opacity: 1; }
    .winner-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 4px; }
    .winner-text { font-family: 'Space Grotesk', sans-serif; font-size: 1.3rem; font-weight: 700; }

    .config-note {
      font-size: 0.78rem; color: var(--muted); line-height: 1.5;
      padding: 10px 12px; background: rgba(88,166,255,0.06);
      border: 1px solid rgba(88,166,255,0.15); border-radius: 8px;
    }
    .config-note code { font-family: monospace; color: var(--accent); }

    .live-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 0.7rem; font-family: 'Space Grotesk', sans-serif;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em;
      color: #2ea043; background: rgba(46,160,67,0.1);
      border: 1px solid rgba(46,160,67,0.25); border-radius: 20px;
      padding: 3px 8px; margin-left: auto;
    }
    .live-badge-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #2ea043; animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
    }

    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 18px; font-size: 0.85rem;
      opacity: 0; transition: opacity 0.3s; z-index: 100; pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .toast.error { border-color: #FF6B6B; }
    .toast.success { border-color: #4ECDC4; }

    @media (max-width: 768px) {
      main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--border); max-height: 55vh; }
    }
  </style>
</head>
<body>

<header>
  <div class="status-dot" id="statusDot"></div>
  <h1>Glücksrad &mdash; Live Abstimmung</h1>
</header>

<main>
  <aside class="sidebar">

    

    <!-- Frage erstellen -->
    <div>
      <div class="section-label">Frage &amp; Antworten</div>
      <div class="card">
        <input type="text" id="questionInput" placeholder="Deine Frage eingeben…" />
        <div id="optionsList"></div>
        <button class="add-btn" id="addOptionBtn">+ Antwort hinzufügen</button>
        <button class="btn" id="publishBtn">Frage veröffentlichen</button>
        <button class="btn danger" id="clearQuestionBtn" style="display:none;">Frage löschen &amp; neu starten</button>
      </div>
    </div>

    <!-- Abstimmung -->
    <div>
      <div class="section-label" style="display:flex;align-items:center;">
        Abstimmung
        <span class="live-badge" id="liveBadge" style="display:none;">
          <span class="live-badge-dot"></span>Live
        </span>
      </div>
      <div class="card">
        <div id="voteOptions">
          <div style="color:var(--muted);font-size:0.85rem;text-align:center;padding:16px 0;">
            Zuerst eine Frage veröffentlichen.
          </div>
        </div>
        <div class="btn-row" style="margin-top:4px;">
          <button class="btn" id="voteBtn" disabled>Abstimmen</button>
          <button class="btn secondary" id="resetBtn" style="width:auto;padding:10px 14px;" title="Stimmen zurücksetzen">↺</button>
        </div>
      </div>
    </div>

  </aside>

  <!-- Rad -->
  <section class="wheel-area">
    <div class="wheel-question" id="wheelQuestion">Noch keine Frage veröffentlicht.</div>

    <div class="wheel-container">
      <div class="empty-wheel" id="emptyWheel">Füge Antwortoptionen hinzu und veröffentliche eine Frage.</div>
      <canvas id="wheelCanvas"></canvas>
      <div class="wheel-pointer" id="wheelPointer"></div>
      <div class="wheel-hub" id="wheelHub"></div>
    </div>

    <div class="wheel-controls">
      <button class="spin-btn" id="spinBtn" disabled>SPIN</button>
      <button class="stop-btn" id="stopBtn" disabled>STOP</button>
    </div>

    <div class="winner-banner" id="winnerBanner">
      <div class="winner-label">Gewinnerin</div>
      <div class="winner-text" id="winnerText"></div>
    </div>
  </section>
</main>

<footer>
  <span>Erstellt von <strong style="color: var(--text);">Shirin Molavy</strong></span>
  <span>Transforming Digitality &mdash; Hochschule Düsseldorf</span>
</footer>
  

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
(function () {
  'use strict';

  // ── HARDCODED CREDENTIALS ─────────────────────────────────
  // Optional: hier eintragen damit du sie nicht jedes Mal eingibst
  var HARDCODED_URL = 'https://kuzogsqliihqpjucqqdt.supabase.co';
  var HARDCODED_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt1em9nc3FsaWlocXBqdWNxcWR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwOTMxMjYsImV4cCI6MjA5ODY2OTEyNn0.UdgP451o2iB0nm-OMs1oOO8aUwTZSA51OMEHhzRgB8w';

  // ── FARBEN ────────────────────────────────────────────────
  var COLORS = [
    '#4ECDC4','#FF6B6B','#FFE66D','#A29BFE',
    '#55EFC4','#FD79A8','#FDCB6E','#74B9FF',
    '#E17055','#00B894'
  ];

  // ── STATE ─────────────────────────────────────────────────
  var db          = null;
  var chVotes     = null;
  var chQuestions = null;

  var options         = [{ label:'', color:COLORS[0] }, { label:'', color:COLORS[1] }];
  var votes           = {};
  var selectedVotes   = [];
  var hasVoted        = false;
  var currentQuestion = '';
  var currentQId      = null;   // Supabase row id der aktiven Frage

  var angle    = 0;
  var velocity = 0;
  var spinning = false;
  var stopping = false;

  // ── DOM ───────────────────────────────────────────────────
  var $ = function(id){ return document.getElementById(id); };
  var elUrl        = $('supabaseUrl');   // kann null sein
  var elKey        = $('supabaseKey');   // kann null sein
  var elConnect    = $('connectBtn');    // kann null sein
  var elAddOpt     = $('addOptionBtn');
  var elPublish    = $('publishBtn');
  var elClearQ     = $('clearQuestionBtn');
  var elVoteBtn    = $('voteBtn');
  var elResetBtn   = $('resetBtn');
  var elSpinBtn    = $('spinBtn');
  var elStopBtn    = $('stopBtn');
  var elOptList    = $('optionsList');
  var elVoteOpts   = $('voteOptions');
  var elWheelQ     = $('wheelQuestion');
  var elEmpty      = $('emptyWheel');
  var elCanvas     = $('wheelCanvas');
  var elPointer    = $('wheelPointer');
  var elHub        = $('wheelHub');
  var elBanner     = $('winnerBanner');
  var elWinner     = $('winnerText');
  var elStatus     = $('statusDot');
  var elToast      = $('toast');
  var elLiveBadge  = $('liveBadge');

  // ── SUPABASE ──────────────────────────────────────────────
  if (elConnect) elConnect.addEventListener('click', connectDB);

  async function connectDB() {
    var url = (elUrl ? elUrl.value.trim() : '') || HARDCODED_URL;
    var key = (elKey ? elKey.value.trim() : '') || HARDCODED_KEY;
    if (!url || !key) { showToast('Bitte URL und Key eintragen.', 'error'); return; }

    try {
      db = window.supabase.createClient(url, key);
      var test = await db.from('questions').select('id').limit(1);
      // PGRST116 = no rows found, das ist ok. Andere Fehler werfen.
      if (test.error && test.error.code !== 'PGRST116' && test.error.code !== '406') {
        throw test.error;
      }

      elStatus.classList.add('online');
      elLiveBadge.style.display = 'inline-flex';
      showToast('Verbunden ✓', 'success');

      await loadActiveQuestion();
      subscribeRealtime();
    } catch(err) {
      db = null;
      elStatus.classList.remove('online');
      console.error('Supabase Verbindungsfehler:', err);
      showToast('Fehler: ' + (err.message || JSON.stringify(err)), 'error');
    }
  }

  // Neueste Frage aus DB laden (für Geräte die später joinen)
  async function loadActiveQuestion() {
    if (!db) return;
    var res = await db
      .from('questions')
      .select('*')
      .order('created_at', { ascending: false })
      .limit(1)
      .single();

    if (res.error || !res.data) return;
    applyQuestion(res.data);
  }

  function applyQuestion(row) {
    currentQId      = row.id;
    currentQuestion = row.question;

    // jsonb aus Supabase kann ein String sein — parsen falls nötig
    var rawOptions = row.options;
    if (typeof rawOptions === 'string') {
      try { rawOptions = JSON.parse(rawOptions); } catch(e) { rawOptions = []; }
    }
    options = Array.isArray(rawOptions) ? rawOptions : [];

    if (options.length < 2) {
      showToast('Frage hat keine gültigen Antwortoptionen.', 'error');
      return;
    }

    votes = {};
    options.forEach(function(o){ votes[o.label] = 0; });
    hasVoted     = false;
    selectedVotes = [];

    elWheelQ.textContent      = currentQuestion;
    $('questionInput').value  = currentQuestion;
    elBanner.classList.remove('show');
    elVoteBtn.textContent     = 'Abstimmen';
    elVoteBtn.disabled        = false;
    elSpinBtn.disabled        = false;
    elClearQ.style.display    = 'block';

    renderOptionsList();
    renderVoteOptions();
    showWheel();
    loadVotes();
  }

  function subscribeRealtime() {
    if (!db) return;

    // Stimmen-Updates
    if (chVotes) db.removeChannel(chVotes);
    chVotes = db.channel('votes_rt')
      .on('postgres_changes', { event:'*', schema:'public', table:'votes' }, loadVotes)
      .subscribe();

    // Neue Frage von anderen Geräten empfangen
    if (chQuestions) db.removeChannel(chQuestions);
    chQuestions = db.channel('questions_rt')
      .on('postgres_changes', { event:'INSERT', schema:'public', table:'questions' }, function(payload) {
        applyQuestion(payload.new);
        showToast('Neue Frage empfangen!', 'success');
      })
      .on('postgres_changes', { event:'DELETE', schema:'public', table:'questions' }, function() {
        resetLocal();
        showToast('Frage wurde gelöscht.', 'success');
      })
      .subscribe();
  }

  async function loadVotes() {
    if (!db || !currentQuestion) return;
    var res = await db
      .from('votes')
      .select('option_label')
      .eq('question', currentQuestion);
    if (res.error) return;

    votes = {};
    options.forEach(function(o){ votes[o.label] = 0; });
    res.data.forEach(function(row){
      if (votes[row.option_label] !== undefined) votes[row.option_label]++;
    });
    renderVoteOptions();
    drawWheel();
  }

  // ── FRAGE VERÖFFENTLICHEN ─────────────────────────────────
  elPublish.addEventListener('click', async function() {
    var q = $('questionInput').value.trim();
    if (!q) { showToast('Bitte eine Frage eingeben.', 'error'); return; }
    var valid = options.filter(function(o){ return o.label.trim(); });
    if (valid.length < 2) { showToast('Mindestens 2 ausgefüllte Antworten.', 'error'); return; }

    options = valid;

    if (db) {
      // Alte Fragen löschen, neue speichern
      await db.from('questions').delete().neq('id', '00000000-0000-0000-0000-000000000000');
      await db.from('votes').delete().neq('id', '00000000-0000-0000-0000-000000000000');

      var res = await db.from('questions').insert({
        question: q,
        options:  options
      }).select().single();

      if (res.error) { showToast('Fehler: ' + res.error.message, 'error'); return; }
      currentQId = res.data.id;
    }

    currentQuestion = q;
    votes = {};
    options.forEach(function(o){ votes[o.label] = 0; });
    hasVoted     = false;
    selectedVotes = [];

    elWheelQ.textContent   = q;
    elBanner.classList.remove('show');
    elVoteBtn.textContent  = 'Abstimmen';
    elVoteBtn.disabled     = false;
    elSpinBtn.disabled     = false;
    elClearQ.style.display = 'block';

    renderOptionsList();
    renderVoteOptions();
    showWheel();
    drawWheel();
    showToast('Frage veröffentlicht!', 'success');
  });

  elClearQ.addEventListener('click', async function() {
    if (db) {
      await db.from('questions').delete().neq('id', '00000000-0000-0000-0000-000000000000');
      await db.from('votes').delete().neq('id', '00000000-0000-0000-0000-000000000000');
    }
    resetLocal();
    showToast('Zurückgesetzt.', 'success');
  });

  function resetLocal() {
    currentQuestion = '';
    currentQId      = null;
    options         = [{ label:'', color:COLORS[0] }, { label:'', color:COLORS[1] }];
    votes           = {};
    hasVoted        = false;
    selectedVotes = [];

    $('questionInput').value   = '';
    elWheelQ.textContent       = 'Noch keine Frage veröffentlicht.';
    elBanner.classList.remove('show');
    elVoteBtn.textContent      = 'Abstimmen';
    elVoteBtn.disabled         = true;
    elSpinBtn.disabled         = true;
    elClearQ.style.display     = 'none';

    elEmpty.style.display      = 'flex';
    elCanvas.style.display     = 'none';
    elPointer.style.display    = 'none';
    elHub.style.display        = 'none';

    elVoteOpts.innerHTML = '<div style="color:var(--muted);font-size:0.85rem;text-align:center;padding:16px 0;">Zuerst eine Frage veröffentlichen.</div>';
    renderOptionsList();
  }

  // ── OPTIONEN ──────────────────────────────────────────────
  elAddOpt.addEventListener('click', function() {
    if (options.length >= 10) { showToast('Maximal 10 Optionen.', 'error'); return; }
    options.push({ label:'', color:COLORS[options.length % COLORS.length] });
    renderOptionsList();
  });

  function renderOptionsList() {
    elOptList.innerHTML = '';
    options.forEach(function(opt, i) {
      var row = document.createElement('div');
      row.className = 'option-row';

      var dot = document.createElement('div');
      dot.className = 'color-dot';
      dot.style.background = opt.color;

      var inp = document.createElement('input');
      inp.type = 'text';
      inp.placeholder = 'Option ' + (i + 1);
      inp.value = opt.label;
      inp.addEventListener('input', (function(idx){ return function(){ options[idx].label = this.value; }; }(i)));

      var btn = document.createElement('button');
      btn.className = 'remove-btn';
      btn.textContent = '×';
      btn.addEventListener('click', (function(idx){ return function(){
        if (options.length <= 2) { showToast('Mindestens 2 Optionen.', 'error'); return; }
        options.splice(idx, 1);
        renderOptionsList();
      }; }(i)));

      row.appendChild(dot); row.appendChild(inp); row.appendChild(btn);
      elOptList.appendChild(row);
    });
  }

  // ── ABSTIMMEN ─────────────────────────────────────────────
  elVoteBtn.addEventListener('click', async function() {
    if (selectedVotes.length === 0) { showToast('Bitte mindestens eine Option wählen.', 'error'); return; }

    if (db) {
      var rows = selectedVotes.map(function(label) {
        return { question: currentQuestion, option_label: label };
      });
      var res = await db.from('votes').insert(rows);
      if (res.error) { showToast('Fehler: ' + res.error.message, 'error'); return; }
    } else {
      selectedVotes.forEach(function(label) {
        votes[label] = (votes[label] || 0) + 1;
      });
      renderVoteOptions(); drawWheel();
    }

   selectedVotes = [];
    renderVoteOptions();
    showToast('Stimmen gezählt! Du kannst erneut abstimmen.', 'success');
  });

  elResetBtn.addEventListener('click', async function() {
    if (db && currentQuestion) {
      await db.from('votes').delete().eq('question', currentQuestion);
    } else {
      options.forEach(function(o){ votes[o.label] = 0; });
      renderVoteOptions(); drawWheel();
    }
    hasVoted = false; selectedVotes = [];
    elVoteBtn.textContent = 'Abstimmen';
    elVoteBtn.disabled = !currentQuestion;
    elBanner.classList.remove('show');
    showToast('Stimmen zurückgesetzt.', 'success');
  });

  function selectVote(label) {
    var idx = selectedVotes.indexOf(label);
    if (idx === -1) {
      selectedVotes.push(label);
    } else {
      selectedVotes.splice(idx, 1);
    }
    renderVoteOptions();
  }

  function renderVoteOptions() {
    if (!currentQuestion) return;
    var total = Object.values(votes).reduce(function(a,b){ return a+b; }, 0);
    elVoteOpts.innerHTML = '';
    options.forEach(function(opt) {
      var count = votes[opt.label] || 0;
      var pct   = total > 0 ? (count / total * 100) : 0;

      var div = document.createElement('div');
      div.className = 'vote-option' + (selectedVotes.indexOf(opt.label) !== -1 ? ' selected' : '');
      div.addEventListener('click', function(){ selectVote(opt.label); });

      div.innerHTML =
        '<div class="color-dot" style="background:' + opt.color + ';"></div>' +
        '<span class="vote-label">' + opt.label + '</span>' +
        '<span class="vote-count">' + count + '</span>' +
        '<div class="vote-bar-wrap"><div class="vote-bar" style="width:' + pct + '%;background:' + opt.color + ';"></div></div>';
      elVoteOpts.appendChild(div);
    });
  }

  // ── RAD ───────────────────────────────────────────────────
  function showWheel() {
    elEmpty.style.display   = 'none';
    elCanvas.style.display  = 'block';
    elPointer.style.display = 'block';
    elHub.style.display     = 'block';
  }

  function drawWheel() {
    if (elCanvas.style.display === 'none') return;
    var size = elCanvas.offsetWidth * (window.devicePixelRatio || 1);
    if (size === 0) size = 420;
    elCanvas.width = elCanvas.height = size;

    var ctx = elCanvas.getContext('2d');
    var cx  = size / 2, cy = size / 2, r = size / 2 - 2;
    var total = Object.values(votes).reduce(function(a,b){ return a+b; }, 0);

    var segs = options.map(function(opt){
      return { label:opt.label, color:opt.color,
               fraction: total > 0 ? (votes[opt.label]||0)/total : 1/options.length };
    });

    ctx.clearRect(0, 0, size, size);
    var start = angle * Math.PI / 180;

    segs.forEach(function(seg) {
      var sweep = seg.fraction * 2 * Math.PI;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, start, start + sweep);
      ctx.closePath();
      ctx.fillStyle = seg.color;
      ctx.fill();
      ctx.strokeStyle = 'rgba(13,17,23,0.5)';
      ctx.lineWidth = 2;
      ctx.stroke();

      var mid = start + sweep / 2;
      ctx.save();
      ctx.translate(cx + Math.cos(mid) * r * 0.62, cy + Math.sin(mid) * r * 0.62);
      ctx.rotate(mid + Math.PI / 2);
      ctx.fillStyle = '#0D1117';
      var fs = Math.max(10, Math.min(16, size * 0.033));
      ctx.font = 'bold ' + fs + 'px "Space Grotesk", sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      wrapText(ctx, seg.label, 0, 0, r * 0.5, fs * 1.2);
      ctx.restore();
      start += sweep;
    });
  }

  function wrapText(ctx, text, x, y, maxW, lh) {
    var words = text.split(' '), line = '', lines = [];
    words.forEach(function(w){
      var t = line ? line+' '+w : w;
      if (ctx.measureText(t).width > maxW && line){ lines.push(line); line = w; } else { line = t; }
    });
    lines.push(line);
    var sy = y - (lines.length-1)*lh/2;
    lines.forEach(function(l,i){ ctx.fillText(l, x, sy+i*lh); });
  }

  // ── SPIN / STOP ───────────────────────────────────────────
  elSpinBtn.addEventListener('click', function() {
    if (!currentQuestion || spinning) return;
    elBanner.classList.remove('show');
    stopping = false; spinning = true;
    velocity = 8 + Math.random() * 4;
    elSpinBtn.disabled = true; elStopBtn.disabled = false;
    requestAnimationFrame(animate);
  });

  elStopBtn.addEventListener('click', function() {
    if (!spinning || stopping) return;
    stopping = true; elStopBtn.disabled = true;
  });

  function animate() {
    if (!spinning) return;
    angle = (angle + velocity) % 360;
    if (stopping) {
      velocity *= 0.972;
      if (velocity < 0.15) {
        spinning = false; stopping = false;
        elStopBtn.disabled = true; elSpinBtn.disabled = false;
        showWinner();
      }
    }
    drawWheel();
    requestAnimationFrame(animate);
  }

  function showWinner() {
    var total = Object.values(votes).reduce(function(a,b){ return a+b; }, 0);
    var segs  = options.map(function(opt){
      return { label:opt.label, color:opt.color,
               fraction: total>0 ? (votes[opt.label]||0)/total : 1/options.length };
    });
    var norm   = ((270 - angle) % 360 + 360) % 360;
    var ptr    = norm * Math.PI / 180;
    var cumul  = 0, winner = segs[0];
    for (var i=0; i<segs.length; i++) {
      cumul += segs[i].fraction * 2 * Math.PI;
      if (ptr < cumul) { winner = segs[i]; break; }
    }
    elWinner.textContent = winner.label;
    elWinner.style.color = winner.color;
    elBanner.classList.add('show');
  }

  // ── TOAST ─────────────────────────────────────────────────
  var toastTimer = null;
  function showToast(msg, type) {
    elToast.textContent = msg;
    elToast.className   = 'toast show' + (type ? ' '+type : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ elToast.classList.remove('show'); }, 2800);
  }

  // ── INIT ──────────────────────────────────────────────────
  window.addEventListener('resize', function(){ if (currentQuestion) drawWheel(); });

  if (HARDCODED_URL && HARDCODED_KEY) {
    if (elUrl) elUrl.value = HARDCODED_URL;
    if (elKey) elKey.value = HARDCODED_KEY;
    connectDB();
  }

  renderOptionsList();

}());
</script>
</body>
